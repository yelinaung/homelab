---
name: lint
"on":
  push:
    paths:
      - "ansible/**"
      - ".github/workflows/lint.yaml"
      - "mise.toml"
jobs:
  secret-detection:
    runs-on: [self-hosted, Linux, X64, playground-ubuntu]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run gitleaks
        run: gitleaks detect --source . --verbose

  lint:
    name: Linting
    runs-on: [self-hosted, Linux, X64, playground-ubuntu]
    steps:
      - uses: actions/checkout@v6
      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Install Ansible Deps
        run: mise run install-ansible-deps
      - name: Lint code with yamllint
        run: mise run lint-ansible
