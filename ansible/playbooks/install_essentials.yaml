---
- name: Install Essential packages on the given servers
  hosts: '{{ vm_hosts | default("all")}}'
  become: true
  gather_facts: true
  tasks:
    - name: Install essential packages
      ansible.builtin.apt:
        name:
          - htop
          - build-essential
          - net-tools
          - git
          - vim
          - curl
          - nfs-common
        state: present
        update_cache: true
      when: ansible_facts['os_family'] == "Debian"
    - name: Remove distro-packaged fzf
      ansible.builtin.apt:
        name: fzf
        state: absent
        autoremove: true
        purge: true
      when: ansible_facts['os_family'] == "Debian"
    - name: Install latest fzf from GitHub releases
      ansible.builtin.include_tasks: tasks/ensure_latest_fzf.yaml
      when: ansible_facts['os_family'] == "Debian"
    - name: Add fzf shell integration to bashrc
      ansible.builtin.lineinfile:
        path: "/home/{{ ansible_user }}/.bashrc"
        line: 'eval "$(fzf --bash)"'
        state: present
      when: ansible_facts['os_family'] == "Debian"
    - name: Remove old distro-specific fzf bashrc entry
      ansible.builtin.lineinfile:
        path: "/home/{{ ansible_user }}/.bashrc"
        line: 'source /usr/share/doc/fzf/examples/key-bindings.bash'
        state: absent
      when: ansible_facts['os_family'] == "Debian"
    - name: Install essential packages (Alpine)
      community.general.apk:
        name:
          - tar
          - gzip
          - htop
          - build-base
          - net-tools
          - git
          - vim
          - curl
          - nfs-utils
          - zsh
        state: present
        update_cache: true
      when: ansible_facts['os_family'] == "Alpine"
    - name: Install latest fzf from GitHub releases (Alpine)
      ansible.builtin.include_tasks: tasks/ensure_latest_fzf.yaml
      when: ansible_facts['os_family'] == "Alpine"
    - name: Set zsh as default shell (Alpine)
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        shell: /bin/zsh
      when: ansible_facts['os_family'] == "Alpine"
    - name: Configure zsh history (Alpine)
      ansible.builtin.blockinfile:
        path: "/home/{{ ansible_user }}/.zshrc"
        block: |
          HISTFILE=~/.zsh_history
          HISTSIZE=10000
          SAVEHIST=10000
          setopt APPEND_HISTORY
          setopt SHARE_HISTORY
        marker: "# {mark} ZSH HISTORY CONFIG"
        create: true
      when: ansible_facts['os_family'] == "Alpine"
    - name: Add fzf shell integration to zshrc (Alpine)
      ansible.builtin.lineinfile:
        path: "/home/{{ ansible_user }}/.zshrc"
        line: 'eval "$(fzf --zsh)"'
        state: present
        create: true
      when: ansible_facts['os_family'] == "Alpine"
    - name: Download starship install script
      ansible.builtin.get_url:
        url: https://starship.rs/install.sh
        dest: /tmp/starship-install.sh
        mode: "0755"
    - name: Install starship
      ansible.builtin.command:
        cmd: /tmp/starship-install.sh -y
        creates: /usr/local/bin/starship
    - name: Add starship shell integration to bashrc
      ansible.builtin.lineinfile:
        path: "/home/{{ ansible_user }}/.bashrc"
        line: 'eval "$(starship init bash)"'
        state: present
      when: ansible_facts['os_family'] != "Alpine"
    - name: Add starship shell integration to zshrc (Alpine)
      ansible.builtin.lineinfile:
        path: "/home/{{ ansible_user }}/.zshrc"
        line: 'eval "$(starship init zsh)"'
        state: present
        create: true
      when: ansible_facts['os_family'] == "Alpine"
