[tools]
python = "3.14.5"
uv = "0.11.23"
terraform = "1.15.6"
tflint = "0.62.1"
# Used to decrypt cloudflare/dns.sops.yaml and convert YAML -> JSON for terraform.
# Pinned to match the versions baked into runners/gitlab/Dockerfile.
sops = "3.13.1"
age = "1.3.1"
yq = "4.53.3"

[tasks.help]
description = "List available mise tasks"
run = "mise tasks ls"

[tasks.plan]
description = "Run terraform plan for proxmox"
run = "cd proxmox && terraform plan -out=output.out"

[tasks.plan-module]
description = "Run terraform plan for a specific proxmox target"
run = '''
module="${MODULE:-${module:-}}"
if [ -z "$module" ]; then
  echo "Set MODULE=<terraform target>" >&2
  exit 1
fi
cd proxmox && terraform plan -out="${module}_output.out" -target="$module"
'''

[tasks.plan-and-generate]
description = "Generate terraform config from proxmox plan"
alias = ["plan_and_generate"]
run = "cd proxmox && terraform plan -generate-config-out=generated.tf"

[tasks.apply]
description = "Apply the saved proxmox terraform plan"
raw = true
run = "cd proxmox && terraform apply output.out"

[tasks.apply-module]
description = "Apply the saved terraform plan for a specific proxmox target"
raw = true
run = '''
module="${MODULE:-${module:-}}"
if [ -z "$module" ]; then
  echo "Set MODULE=<terraform target>" >&2
  exit 1
fi
cd proxmox && terraform apply "${module}_output.out"
'''

[tasks.plan-and-apply-module]
description = "Plan and apply a specific proxmox terraform target"
raw = true
run = '''
module="${MODULE:-${module:-}}"
if [ -z "$module" ]; then
  echo "Set MODULE=<terraform target>" >&2
  exit 1
fi
cd proxmox && terraform plan -out="${module}_output.out" -target="$module" && terraform apply "${module}_output.out"
'''

[tasks.fmt]
description = "Format terraform files in proxmox"
run = "cd proxmox && terraform fmt -recursive"

[tasks.init]
description = "Initialize terraform in proxmox"
raw = true
run = "cd proxmox && terraform init"

[tasks.init-and-upgrade]
description = "Initialize and upgrade terraform providers in proxmox"
raw = true
run = "cd proxmox && terraform init -upgrade"

[tasks.import]
description = "Import terraform state into proxmox"
raw = true
run = '''
module="${MODULE:-${module:-}}"
id="${ID:-${id:-}}"
if [ -z "$module" ] || [ -z "$id" ]; then
  echo "Set MODULE=<terraform target> and ID=<resource id>" >&2
  exit 1
fi
cd proxmox && terraform import "$module" "$id"
'''

[tasks.rm-state]
description = "Remove a resource from proxmox terraform state"
raw = true
run = '''
module="${MODULE:-${module:-}}"
if [ -z "$module" ]; then
  echo "Set MODULE=<terraform target>" >&2
  exit 1
fi
cd proxmox && terraform state rm "$module"
'''

[tasks.ls-state]
description = "List resources in proxmox terraform state"
run = "cd proxmox && terraform state list"

[tasks.lint]
description = "Run tflint against proxmox terraform"
run = "cd proxmox && tflint --recursive -f compact --color"

[tasks.plan-dns]
description = "Decrypt SOPS DNS config, convert to JSON, and run terraform plan for cloudflare"
run = """
cd cloudflare
# Local: export CLOUDFLARE_API_TOKEN from .env. CI: var is already in the env
# and .env doesn't exist, so this is a no-op there.
set -a; [ -f .env ] && . ./.env; set +a
sops -d dns.sops.yaml | yq -o=json > dns.auto.tfvars.json
terraform plan -out=output.out
"""

[tasks.apply-dns]
description = "Apply the saved cloudflare terraform plan"
raw = true
run = """
cd cloudflare
set -a; [ -f .env ] && . ./.env; set +a
terraform apply output.out
"""

[tasks.init-dns]
description = "Initialize terraform in cloudflare"
raw = true
run = "cd cloudflare && terraform init"

[tasks.fmt-dns]
description = "Format terraform files in cloudflare"
run = "cd cloudflare && terraform fmt -recursive"

[tasks.plan-tailscale]
description = "Run terraform plan for tailscale"
run = "cd tailscale && terraform plan -out=output.out"

[tasks.apply-tailscale]
description = "Apply the saved tailscale terraform plan"
raw = true
run = "cd tailscale && terraform apply output.out"

[tasks.init-tailscale]
description = "Initialize terraform in tailscale"
raw = true
run = "cd tailscale && terraform init"

[tasks.fmt-tailscale]
description = "Format terraform files in tailscale"
run = "cd tailscale && terraform fmt -recursive"

[tasks.lint-tailscale]
description = "Run tflint against tailscale terraform"
run = "cd tailscale && tflint --recursive -f compact --color"

[tasks.import-tailscale]
description = "Import terraform state into tailscale"
raw = true
run = '''
module="${MODULE:-${module:-}}"
id="${ID:-${id:-}}"
if [ -z "$module" ] || [ -z "$id" ]; then
  echo "Set MODULE=<terraform target> and ID=<resource id>" >&2
  exit 1
fi
cd tailscale && terraform import "$module" "$id"
'''

[tasks.rm-state-tailscale]
description = "Remove a resource from tailscale terraform state"
raw = true
run = '''
module="${MODULE:-${module:-}}"
if [ -z "$module" ]; then
  echo "Set MODULE=<terraform target>" >&2
  exit 1
fi
cd tailscale && terraform state rm "$module"
'''

[tasks.ls-state-tailscale]
description = "List resources in tailscale terraform state"
run = "cd tailscale && terraform state list"

[tasks.push-all]
description = "Rebase from github and push the current branch to every configured remote"
run = '''
set -e
branch="$(git rev-parse --abbrev-ref HEAD)"
if [ "$branch" = "HEAD" ]; then
  echo "Detached HEAD; please checkout a branch before pushing."
  exit 1
fi
remotes="$(git remote)"
if [ -z "$remotes" ]; then
  echo "No git remotes configured."
  exit 1
fi
echo "Pulling $branch from github with rebase..."
git pull --rebase --autostash github "$branch"
for remote in $remotes; do
  echo "Pushing $branch to $remote..."
  git push "$remote" "$branch"
done
'''

[tasks.playbook]
description = "Run an ansible playbook from ansible/playbooks"
raw = true
run = '''
playbook="${PLAYBOOK:-${playbook:-apt_ubuntu_vms}}"
inventory="${INVENTORY:-${inventory:-hosts}}"
vm_hosts="${VM_HOSTS:-${vm_hosts:-}}"
become="${BECOME:-${become:-false}}"
extra_vars="${EXTRA_VARS:-${extra_vars:-}}"
verbosity="${ANSIBLE_VERBOSITY:-${ansible_verbosity:-}}"
mitogen="${MITOGEN:-${mitogen:-false}}"

export ANSIBLE_CONFIG="./ansible/ansible.cfg"

# Opt-in: enable the Mitogen execution strategy (persistent remote interpreter,
# in-memory module transport). Resolves the plugin dir from the installed package.
if [ "$mitogen" = "true" ]; then
  mitogen_dir="$(.venv/bin/python -c 'import os,ansible_mitogen; print(os.path.join(os.path.dirname(ansible_mitogen.__file__),"plugins","strategy"))')"
  export ANSIBLE_STRATEGY_PLUGINS="$mitogen_dir"
  export ANSIBLE_STRATEGY="mitogen_linear"
fi

set -- ansible-playbook "./ansible/playbooks/${playbook}.yaml" -i "./ansible/inventory/${inventory}.yaml"

if [ "$become" = "true" ]; then
  set -- "$@" --ask-become-pass
fi

if [ -n "$vm_hosts" ]; then
  set -- "$@" --extra-vars "vm_hosts=$vm_hosts"
fi

if [ -n "$extra_vars" ]; then
  set -- "$@" --extra-vars "$extra_vars"
fi

if [ -n "$verbosity" ]; then
  for _ in $(seq 1 "$verbosity"); do
    set -- "$@" -v
  done
fi

"$@"
'''

[tasks.install-ansible-deps]
description = "Install ansible-core, collections and roles into .venv"
run = '''
uv venv --allow-existing --python 3.14
uv pip install ansible-core ansible-lint yamllint mitogen
.venv/bin/ansible-galaxy collection install -v -r ansible/requirements.yml
.venv/bin/ansible-galaxy role install -v -r ansible/requirements.yml
'''

[tasks.test-ansible]
description = "Run syntax, ansible-lint, and yamllint for one playbook"
run = '''
playbook="${PLAYBOOK:-${playbook:-apt_ubuntu_vms}}"
printf "\033[0;32mRunning Ansible Syntax check\033[0m\n"
.venv/bin/ansible-playbook "ansible/playbooks/${playbook}.yaml" -i ansible/inventory/linux_hosts.yaml --syntax-check

printf "\033[0;32mRunning Ansible Lint\033[0m\n"
.venv/bin/ansible-lint "ansible/playbooks/${playbook}.yaml"

printf "\033[0;32mRunning YAML Lint\033[0m\n"
.venv/bin/yamllint "ansible/playbooks/${playbook}.yaml"
'''

[tasks.lint-ansible]
description = "Run syntax checks, ansible-lint, and yamllint for all playbooks"
run = '''
export ANSIBLE_CONFIG=ansible/ansible.cfg
printf "\033[0;32mRunning Ansible Syntax check on all playbooks\033[0m\n"
for playbook in ansible/playbooks/*.yaml; do
  echo "Checking $playbook..."
  .venv/bin/ansible-playbook "$playbook" -i ansible/inventory/linux_hosts.yaml --syntax-check || exit 1
done

printf "\033[0;32mRunning Ansible Lint\033[0m\n"
.venv/bin/ansible-lint ansible/

printf "\033[0;32mRunning YAML Lint\033[0m\n"
.venv/bin/yamllint ansible/playbooks/*.yaml
'''

[tasks.test-ansible-diff]
description = "Run ansible in check+diff mode for one playbook"
raw = true
run = '''
playbook="${PLAYBOOK:-${playbook:-apt_ubuntu_vms}}"
vm_hosts="${VM_HOSTS:-${vm_hosts:-}}"
printf "\033[0;32mRunning Ansible Diff\033[0m\n"
.venv/bin/ansible-playbook "ansible/playbooks/${playbook}.yaml" --inventory ansible/inventory/linux_hosts.yaml --check --diff -e "vm_hosts=${vm_hosts}"

'''
