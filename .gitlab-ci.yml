---
include:
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/SAST.gitlab-ci.yml

stages:
  - build
  - security
  - test
  - validate
  - lint
  - plan
  - deploy
  - cleanup

# Shared CI image, built by build_ci_image and pushed to the GitLab registry.
# TODO: pin by @sha256 digest once Renovate (or `crane digest`) provides one.
variables:
  CI_IMAGE: "${CI_REGISTRY_IMAGE}/ci:latest"
  # GitLab-managed Terraform HTTP backend auth — applies to every terraform job.
  TF_HTTP_USERNAME: gitlab-ci-token
  TF_HTTP_PASSWORD: $CI_JOB_TOKEN


# =============================================================================
# Build the CI image used by downstream jobs and push to GitLab registry.
# Kaniko auto-authenticates to $CI_REGISTRY via CI_JOB_TOKEN.
# =============================================================================
build_ci_image:
  stage: build
  # TODO: pin by @sha256 digest once Renovate (or `crane digest`) provides one
  image:
    # yamllint disable-line rule:line-length
    name: gcr.io/kaniko-project/executor:v1.23.2-debug@sha256:c3109d5926a997b100c4343944e06c6b30a6804b2f9abe0994d3de6ef92b028e
    entrypoint: [""]
  tags:
    - playground-bravo
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - runners/gitlab/Dockerfile
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - runners/gitlab/Dockerfile
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}/runners/gitlab"
      --dockerfile "${CI_PROJECT_DIR}/runners/gitlab/Dockerfile"
      --destination "${CI_REGISTRY_IMAGE}/ci:${CI_COMMIT_SHORT_SHA}"
      --destination "${CI_REGISTRY_IMAGE}/ci:latest"


secret_detection:
  stage: security
  tags:
  - playground-bravo

check_secrets:
  stage: validate
  image: apteno/alpine-jq:latest@sha256:19d748c62e9431e25878b16d571c374c1d4794029b7420bc8ae94521a861e816
  tags:
  - playground-bravo
  needs:
  - job: secret_detection
    artifacts: true
  script:
  - |
    if [ ! -f "gl-secret-detection-report.json" ]; then
      echo "Secret detection report not found!"
      exit 1
    fi

    if [ "$(jq '.vulnerabilities | length' gl-secret-detection-report.json)" -gt 0 ]; then
      echo "Secrets detected in the codebase!"
      jq -r '.vulnerabilities[] | "- \(.message) in \(.location.file):\(.location.start_line)"' \
        gl-secret-detection-report.json
      exit 1
    else
      echo "No secrets detected"
    fi

semgrep-sast:
  stage: security
  tags:
  - playground-bravo
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

check_sast:
  stage: validate
  image: apteno/alpine-jq:latest@sha256:19d748c62e9431e25878b16d571c374c1d4794029b7420bc8ae94521a861e816
  tags:
  - playground-bravo
  needs:
  - job: semgrep-sast
    artifacts: true
  script:
  - |
    if [ ! -f "gl-sast-report.json" ]; then
      echo "SAST report not found!"
      exit 1
    fi

    VULN_COUNT=$(jq '.vulnerabilities | length' gl-sast-report.json)
    if [ "$VULN_COUNT" -gt 0 ]; then
      echo "SAST vulnerabilities detected!"
      jq -r '.vulnerabilities[] | "- [\(.severity)] \(.name) in \(.location.file):\(.location.start_line)"' \
        gl-sast-report.json
      exit 1
    else
      echo "No SAST vulnerabilities detected"
    fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# =============================================================================
# Proxmox Terraform fmt + validate + tflint
# =============================================================================
proxmox_validate:
  stage: validate
  image: $CI_IMAGE
  tags:
  - playground-bravo
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      changes:
        - proxmox/**
        - mise.toml
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - proxmox/**
        - mise.toml
  before_script:
    - cd ./proxmox
  script:
    - terraform fmt -check || true
    - terraform init
    - terraform validate -no-color

proxmox_tflint:
  stage: validate
  image: $CI_IMAGE
  tags:
  - playground-bravo
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      changes:
        - proxmox/**
        - mise.toml
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - proxmox/**
        - mise.toml
  script:
    - tflint --version
    - mise run lint

proxmox_plan:
  stage: plan
  image: $CI_IMAGE
  tags:
  - playground-bravo
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      changes:
        - proxmox/**
        - mise.toml
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - proxmox/**
        - mise.toml
  needs:
    - proxmox_tflint
    - proxmox_validate
    - job: check_sast
      optional: true
    - job: check_secrets
      optional: true
  # config.auto.tfvars is committed; TF_VAR_password is a masked CI/CD variable.
  script:
    - mise run init
    - mise run plan
  artifacts:
    paths:
      - proxmox/output.out
    expire_in: 7 days

proxmox_apply:
  stage: deploy
  image: $CI_IMAGE
  tags:
  - playground-bravo
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - proxmox/**
        - mise.toml
      when: manual
  script:
    - mise run init
    - mise run apply
  needs:
    - proxmox_plan


# =============================================================================
# Tailscale Terraform fmt + validate + tflint
# =============================================================================
tailscale_validate:
  stage: validate
  image: $CI_IMAGE
  tags:
  - playground-bravo
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      changes:
        - tailscale/**
        - mise.toml
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - tailscale/**
        - mise.toml
  before_script:
    - cd ./tailscale
  script:
    - terraform fmt -check
    - terraform init
    - terraform validate -no-color

tailscale_tflint:
  stage: validate
  image: $CI_IMAGE
  tags:
  - playground-bravo
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      changes:
        - tailscale/**
        - mise.toml
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - tailscale/**
        - mise.toml
  script:
    - tflint --version
    - mise run lint-tailscale

tailscale_plan:
  stage: plan
  image: $CI_IMAGE
  tags:
  - playground-bravo
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      changes:
        - tailscale/**
        - mise.toml
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - tailscale/**
        - mise.toml
  needs:
    - tailscale_tflint
    - tailscale_validate
    - job: check_sast
      optional: true
    - job: check_secrets
      optional: true
  # config.auto.tfvars is committed; TF_VAR_tailscale_oauth_client_id and
  # TF_VAR_tailscale_oauth_client_secret are masked CI/CD variables.
  script:
    - mise run init-tailscale
    - mise run plan-tailscale
  artifacts:
    paths:
      - tailscale/output.out
    expire_in: 7 days

tailscale_apply:
  stage: deploy
  image: $CI_IMAGE
  tags:
  - playground-bravo
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - tailscale/**
        - mise.toml
      when: manual
  script:
    - mise run init-tailscale
    - mise run apply-tailscale
  needs:
    - tailscale_plan


cloudflare_validate:
  stage: validate
  image: $CI_IMAGE
  tags:
    - playground-bravo
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      changes:
        - cloudflare/**
        - mise.toml
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - cloudflare/**
        - mise.toml
  script:
    - terraform -chdir=cloudflare fmt -check
    - terraform -chdir=cloudflare init
    - terraform -chdir=cloudflare validate -no-color

cloudflare_plan:
  stage: plan
  image: $CI_IMAGE
  tags:
    - playground-bravo
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      changes:
        - cloudflare/**
        - mise.toml
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - cloudflare/**
        - mise.toml
  needs:
    - cloudflare_validate
    - job: check_sast
      optional: true
    - job: check_secrets
      optional: true
  # sops/age/yq are baked into $CI_IMAGE (runners/gitlab/Dockerfile).
  # SOPS_AGE_KEY and CLOUDFLARE_API_TOKEN are masked CI/CD variables.
  script:
    - mise run init-dns
    - mise run plan-dns
  artifacts:
    paths:
      - cloudflare/output.out
    expire_in: 7 days

cloudflare_apply:
  stage: deploy
  image: $CI_IMAGE
  tags:
    - playground-bravo
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - cloudflare/**
        - mise.toml
      when: manual
  needs:
    - cloudflare_plan
  script:
    - mise run init-dns
    - mise run apply-dns


# =============================================================================
# Ansible lint (only when ansible/** or mise.toml changes)
# =============================================================================
ansible-lint:
  stage: lint
  image: $CI_IMAGE
  tags:
    - playground-bravo
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      changes:
        - ansible/**
        - mise.toml
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - ansible/**
        - mise.toml
  script:
    - mise run install-ansible-deps
    - mise run lint-ansible


# =============================================================================
# Ansible APT update/upgrade (dry-run preview)
# =============================================================================
.ansible_ssh_setup: &ansible_ssh_setup
  before_script:
    - mkdir -p ~/.ssh
    - cp "$ANSIBLE_SSH_KEY" ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts

# =============================================================================
# Ansible APT update/upgrade (dry-run preview)
# =============================================================================
ansible_apt_update_check:
  <<: *ansible_ssh_setup
  stage: plan
  image: $CI_IMAGE
  tags:
    - playground-bravo
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      changes:
        - ansible/**
        - mise.toml
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - ansible/**
        - mise.toml
  script:
    - mise run install-ansible-deps
    - PLAYBOOK=apt_update_upgrade VM_HOSTS=all mise run test-ansible-diff

# =============================================================================
# Ansible APT update/upgrade (apply)
# =============================================================================
ansible_apt_update:
  <<: *ansible_ssh_setup
  stage: deploy
  image: $CI_IMAGE
  tags:
    - playground-bravo
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - ansible/**
        - mise.toml
      when: manual
  needs:
    - ansible_apt_update_check
  script:
    - mise run install-ansible-deps
    - ANSIBLE_VERBOSITY=0 PLAYBOOK=apt_update_upgrade INVENTORY=linux_hosts mise run playbook
