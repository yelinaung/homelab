---
include:
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/SAST.gitlab-ci.yml

stages:
  - build
  - security
  - test
  - validate
  - lint
  - plan
  - deploy
  - cleanup

# Shared CI image, built by build_ci_image and pushed to the GitLab registry.
# TODO: pin by @sha256 digest once Renovate (or `crane digest`) provides one.
variables:
  CI_IMAGE: "${CI_REGISTRY_IMAGE}/ci:latest"
  # GitLab-managed Terraform HTTP backend auth — applies to every terraform job.
  TF_HTTP_USERNAME: gitlab-ci-token
  TF_HTTP_PASSWORD: $CI_JOB_TOKEN


# =============================================================================
# Build the CI image used by downstream jobs and push to GitLab registry.
# Kaniko auto-authenticates to $CI_REGISTRY via CI_JOB_TOKEN.
# =============================================================================
build_ci_image:
  stage: build
  # TODO: pin by @sha256 digest once Renovate (or `crane digest`) provides one
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  tags:
    - playground-bravo
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - runners/gitlab/Dockerfile
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - runners/gitlab/Dockerfile
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}/runners/gitlab"
      --dockerfile "${CI_PROJECT_DIR}/runners/gitlab/Dockerfile"
      --destination "${CI_REGISTRY_IMAGE}/ci:${CI_COMMIT_SHORT_SHA}"
      --destination "${CI_REGISTRY_IMAGE}/ci:latest"


secret_detection:
  stage: security
  tags:
  - playground-bravo

check_secrets:
  stage: validate
  image: apteno/alpine-jq:latest@sha256:3470a642109f10a1549037877c94de78de8395d566c197f52bb8521b9aeec273
  tags:
  - playground-bravo
  needs:
  - job: secret_detection
    artifacts: true
  script:
  - |
    if [ ! -f "gl-secret-detection-report.json" ]; then
      echo "Secret detection report not found!"
      exit 1
    fi

    if [ "$(jq '.vulnerabilities | length' gl-secret-detection-report.json)" -gt 0 ]; then
      echo "Secrets detected in the codebase!"
      jq -r '.vulnerabilities[] | "- \(.message) in \(.location.file):\(.location.start_line)"' \
        gl-secret-detection-report.json
      exit 1
    else
      echo "No secrets detected"
    fi

semgrep-sast:
  stage: security
  tags:
  - playground-bravo
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

check_sast:
  stage: validate
  image: apteno/alpine-jq:latest@sha256:3470a642109f10a1549037877c94de78de8395d566c197f52bb8521b9aeec273
  tags:
  - playground-bravo
  needs:
  - job: semgrep-sast
    artifacts: true
  script:
  - |
    if [ ! -f "gl-sast-report.json" ]; then
      echo "SAST report not found!"
      exit 1
    fi

    VULN_COUNT=$(jq '.vulnerabilities | length' gl-sast-report.json)
    if [ "$VULN_COUNT" -gt 0 ]; then
      echo "SAST vulnerabilities detected!"
      jq -r '.vulnerabilities[] | "- [\(.severity)] \(.name) in \(.location.file):\(.location.start_line)"' \
        gl-sast-report.json
      exit 1
    else
      echo "No SAST vulnerabilities detected"
    fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# =============================================================================
# Proxmox Terraform fmt + validate + tflint
# =============================================================================
proxmox_validate:
  stage: validate
  image: $CI_IMAGE
  tags:
  - playground-bravo
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      changes:
        - proxmox/**
        - mise.toml
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - proxmox/**
        - mise.toml
  before_script:
    - cd ./proxmox
  script:
    - terraform fmt -check || true
    - terraform init
    - terraform validate -no-color

proxmox_tflint:
  stage: validate
  image: $CI_IMAGE
  tags:
  - playground-bravo
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      changes:
        - proxmox/**
        - mise.toml
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - proxmox/**
        - mise.toml
  script:
    - tflint --version
    - mise run lint

proxmox_plan:
  stage: plan
  image: $CI_IMAGE
  tags:
  - playground-bravo
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      changes:
        - proxmox/**
        - mise.toml
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - proxmox/**
        - mise.toml
  needs:
    - proxmox_tflint
    - proxmox_validate
    - job: check_sast
      optional: true
    - job: check_secrets
      optional: true
  before_script:
    - cp "$PROXMOX_TFVARS" proxmox/values.tfvars
  script:
    - mise run init
    - mise run plan
  artifacts:
    paths:
      - proxmox/output.out
    expire_in: 7 days

proxmox_apply:
  stage: deploy
  image: $CI_IMAGE
  tags:
  - playground-bravo
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - proxmox/**
        - mise.toml
      when: manual
  script:
    - mise run init
    - mise run apply
  needs:
    - proxmox_plan


