---
include:
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/SAST.gitlab-ci.yml

stages:
  - security
  - test
  - validate
  - lint
  - plan
  - deploy
  - cleanup


secret_detection:
  stage: security
  tags:
  - playground-bravo

check_secrets:
  stage: validate
  image: apteno/alpine-jq:latest@sha256:3470a642109f10a1549037877c94de78de8395d566c197f52bb8521b9aeec273
  tags:
  - playground-bravo
  needs:
  - job: secret_detection
    artifacts: true
  script:
  - |
    if [ ! -f "gl-secret-detection-report.json" ]; then
      echo "Secret detection report not found!"
      exit 1
    fi

    if [ "$(jq '.vulnerabilities | length' gl-secret-detection-report.json)" -gt 0 ]; then
      echo "Secrets detected in the codebase!"
      jq -r '.vulnerabilities[] | "- \(.message) in \(.location.file):\(.location.start_line)"' \
        gl-secret-detection-report.json
      exit 1
    else
      echo "No secrets detected"
    fi

semgrep-sast:
  stage: security
  tags:
  - playground-bravo

check_sast:
  stage: validate
  image: apteno/alpine-jq:latest@sha256:3470a642109f10a1549037877c94de78de8395d566c197f52bb8521b9aeec273
  tags:
  - playground-bravo
  needs:
  - job: semgrep-sast
    artifacts: true
  script:
  - |
    if [ ! -f "gl-sast-report.json" ]; then
      echo "SAST report not found!"
      exit 1
    fi

    VULN_COUNT=$(jq '.vulnerabilities | length' gl-sast-report.json)
    if [ "$VULN_COUNT" -gt 0 ]; then
      echo "SAST vulnerabilities detected!"
      jq -r '.vulnerabilities[] | "- [\(.severity)] \(.name) in \(.location.file):\(.location.start_line)"' \
        gl-sast-report.json
      exit 1
    else
      echo "No SAST vulnerabilities detected"
    fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# =============================================================================
# Terraform fmt + validate + tflint
# =============================================================================
tf-fmt-validate:
  stage: validate
  tags:
  - playground-bravo
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  before_script:
    - cd ./proxmox
  script:
    - terraform fmt -check || true
    - terraform init
    - terraform validate -no-color

tflint:
  stage: validate
  tags:
  - playground-bravo
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  before_script:
    - cd ./proxmox
  script:
    - tflint --version
    - tflint -f compact --recursive

terraform-plan:
  stage: plan
  tags:
  - playground-bravo
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  needs:
    - tflint
    - tf-fmt-validate
    - check_sast
    - check_secrets
  before_script:
    - cd ./proxmox
  script:
    - terraform init
    - terraform plan -out=plan.tfplan -no-color
  artifacts:
    paths:
      - proxmox/plan.tfplan
    expire_in: 7 days

terraform-apply:
  stage: deploy
  tags:
  - playground-bravo
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  before_script:
    - cd ./proxmox
  script:
    - terraform init
    - terraform apply -no-color plan.tfplan
  needs:
    - terraform-plan

# =============================================================================
# Ansible lint (only when ansible/** or mise.toml changes)
# =============================================================================
ansible-lint:
  stage: lint
  tags:
    - playground-bravo
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      changes:
        - ansible/**
        - mise.toml
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - ansible/**
        - mise.toml
  script:
    - curl https://mise.run | sh
    - export PATH="$HOME/.local/bin:$PATH"
    - mise run install-ansible-deps
    - mise run lint-ansible
