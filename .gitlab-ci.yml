---
include:
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/SAST.gitlab-ci.yml

stages:
  - build
  - security
  - test
  - validate
  - lint
  - plan
  - deploy
  - cleanup


# =============================================================================
# Build the CI image used by downstream jobs and push to GitLab registry.
# Kaniko auto-authenticates to $CI_REGISTRY via CI_JOB_TOKEN.
# =============================================================================
build_ci_image:
  stage: build
  # TODO: pin by @sha256 digest once Renovate (or `crane digest`) provides one
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  tags:
    - playground-bravo
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - runners/gitlab/Dockerfile
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - runners/gitlab/Dockerfile
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}/runners/gitlab"
      --dockerfile "${CI_PROJECT_DIR}/runners/gitlab/Dockerfile"
      --destination "${CI_REGISTRY_IMAGE}/ci:${CI_COMMIT_SHORT_SHA}"
      --destination "${CI_REGISTRY_IMAGE}/ci:latest"


secret_detection:
  stage: security
  tags:
  - playground-bravo

check_secrets:
  stage: validate
  image: apteno/alpine-jq:latest@sha256:3470a642109f10a1549037877c94de78de8395d566c197f52bb8521b9aeec273
  tags:
  - playground-bravo
  needs:
  - job: secret_detection
    artifacts: true
  script:
  - |
    if [ ! -f "gl-secret-detection-report.json" ]; then
      echo "Secret detection report not found!"
      exit 1
    fi

    if [ "$(jq '.vulnerabilities | length' gl-secret-detection-report.json)" -gt 0 ]; then
      echo "Secrets detected in the codebase!"
      jq -r '.vulnerabilities[] | "- \(.message) in \(.location.file):\(.location.start_line)"' \
        gl-secret-detection-report.json
      exit 1
    else
      echo "No secrets detected"
    fi

semgrep-sast:
  stage: security
  tags:
  - playground-bravo
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

check_sast:
  stage: validate
  image: apteno/alpine-jq:latest@sha256:3470a642109f10a1549037877c94de78de8395d566c197f52bb8521b9aeec273
  tags:
  - playground-bravo
  needs:
  - job: semgrep-sast
    artifacts: true
  script:
  - |
    if [ ! -f "gl-sast-report.json" ]; then
      echo "SAST report not found!"
      exit 1
    fi

    VULN_COUNT=$(jq '.vulnerabilities | length' gl-sast-report.json)
    if [ "$VULN_COUNT" -gt 0 ]; then
      echo "SAST vulnerabilities detected!"
      jq -r '.vulnerabilities[] | "- [\(.severity)] \(.name) in \(.location.file):\(.location.start_line)"' \
        gl-sast-report.json
      exit 1
    else
      echo "No SAST vulnerabilities detected"
    fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# =============================================================================
# Proxmox Terraform fmt + validate + tflint
# =============================================================================
proxmox_validate:
  stage: validate
  tags:
  - playground-bravo
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  before_script:
    - cd ./proxmox
  script:
    - terraform fmt -check || true
    - terraform init
    - terraform validate -no-color

proxmox_tflint:
  stage: validate
  image: ghcr.io/yelinaung/homelab/ci:2026-02-23@sha256:2e9089a3b3d162df4129b4caae2b73a760230262d9bd9812572e172059933e04
  tags:
  - playground-bravo
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  before_script:
    - cd ./proxmox
  script:
    - tflint --version
    - tflint -f compact --recursive

proxmox_plan:
  stage: plan
  tags:
  - playground-bravo
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  needs:
    - proxmox_tflint
    - proxmox_validate
    - check_sast
    - check_secrets
  before_script:
    - cd ./proxmox
  script:
    - terraform init
    - terraform plan -out=plan.tfplan -no-color
  artifacts:
    paths:
      - proxmox/plan.tfplan
    expire_in: 7 days

proxmox_apply:
  stage: deploy
  tags:
  - playground-bravo
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  before_script:
    - cd ./proxmox
  script:
    - terraform init
    - terraform apply -no-color plan.tfplan
  needs:
    - proxmox_plan


cloudflare_validate:
  stage: validate
  tags:
    - playground-bravo
  # yamllint disable rule:line-length
  image: ghcr.io/yelinaung/homelab/ci:2026-02-23@sha256:2e9089a3b3d162df4129b4caae2b73a760230262d9bd9812572e172059933e04
  # yamllint enable rule:line-length
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      changes:
        - cloudflare/**
        - mise.toml
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - cloudflare/**
        - mise.toml
  script:
    - terraform -chdir=cloudflare fmt -check
    - terraform -chdir=cloudflare init
    - terraform -chdir=cloudflare validate -no-color


# =============================================================================
# Ansible lint (only when ansible/** or mise.toml changes)
# =============================================================================
ansible-lint:
  stage: lint
  tags:
    - playground-bravo
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      changes:
        - ansible/**
        - mise.toml
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - ansible/**
        - mise.toml
  script:
    - curl https://mise.run | sh
    - export PATH="$HOME/.local/bin:$PATH"
    - mise run install-ansible-deps
    - mise run lint-ansible
